<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>初萊食麵 營業版</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  margin:0;
  color:#333;
}

/* 頭部 */
header{
  background:#3a3a3a;   /* 深灰底 */
  color:#d4af37;        /* 金色字 */
  text-align:center;
  padding:18px 10px;
  border-bottom:2px solid #d4af37;
}

header h1{
  color:#d4af37;
  font-size:28px;
  letter-spacing:2px;
  margin:5px 0;
}

header p{
  margin:3px 0;
  font-size:14px;
}

/* 主容器 */
.wrap{
  max-width:900px;
  margin:auto;
  padding:12px;
  padding-bottom:140px;
}

/* 卡片 */
.card{
  background:#fff;
  padding:15px;
  margin-bottom:12px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

/* 標題 */
.card h2{
  color:#c65d1e;
  font-size:18px;
  border-left:6px solid #c65d1e;
  padding-left:10px;
  margin-bottom:10px;
}

/* 商品列 */
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.item span{
  font-size:15px;
}

/* 價格強化 */
.item span:last-child{
  font-weight:bold;
  color:#d32f2f;
}

/* 加減按鈕區 */
.qty{
  display:flex;
  align-items:center;
  gap:6px;
}

.qty button{
  width:34px;
  height:34px;
  border:none;
  border-radius:6px;
  background:#c65d1e;
  color:#fff;
  font-size:18px;
}

.qty button:active{
  transform:scale(0.95);
}

.qty span{
  min-width:22px;
  text-align:center;
  font-weight:bold;
}

/* 輸入欄 */
input, textarea, select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:14px;
}

/* 總金額 */
.order-total{
  text-align:center;
  margin-top:12px;
  font-size:22px;
  font-weight:bold;
  color:#c65d1e;
}

#total{
  font-size:34px;
  color:#d32f2f;
}

/* 送出按鈕 */
.submit-btn{
  width:100%;
  padding:14px;
  margin-top:10px;
  background:#c65d1e;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
}

.submit-btn:active{
  transform:scale(0.98);
}

.submit-btn:disabled{
  background:#999;
}

/* 圖片 */
img{
  border-radius:12px;
}

/* 小提示區 */
.notice{
  font-size:14px;
  line-height:1.5;
  color:#555;
}
</style>
</head>

<body>

<header>
<h1>初萊食麵</h1>
<p>高雄市三民區遼寧二街168號</p>
<p>週一~週五 11:30-20:30｜週六~週日 11:30-18:30</p>
<a href="tel:0903392687" style="color:#fff;">📞 0903-392687</a>
</header>

<div class="wrap">

<div class="card">
<img src="https://res.cloudinary.com/dh1yjrfyr/image/upload/q_auto,f_auto/IMG_3424_ob2qm4.jpg"
style="width:100%;border-radius:12px;">
</div>

<div class="card">
<h2>公告</h2>
<div id="notice">歡迎使用線上點餐</div>
</div>

<div class="card"><h2>🍜 麵類</h2><div id="cat1"></div></div>
<div class="card"><h2>🍢 關東煮</h2><div id="cat2"></div></div>
<div class="card"><h2>🥚 小菜</h2><div id="cat3"></div></div>
<div class="card"><h2>🍲 湯類</h2><div id="cat4"></div></div>
<div class="card"><h2>🍚 其他</h2><div id="cat5"></div></div>

<div class="card">
<h2>訂購資訊</h2>
<input id="name" placeholder="姓名(必填)">
<input id="phone" placeholder="電話(必填)">
<textarea id="note" placeholder="備註：例如不加蔥、加辣"></textarea>
<div style="
background:#fff3cd;
padding:10px;
border-radius:8px;
margin-bottom:8px;
font-weight:bold;
text-align:center;
">
⏰ 提前預訂請填寫取餐時間，立即取餐免填
</div>

<label style="
display:block;
font-weight:bold;
margin-bottom:5px;
">
⏰ 取餐時間
</label>

<input
id="time"
type="time"
min="11:30"
max="20:30"
style="
font-size:18px;
padding:12px;
">

<div class="order-total">
總金額：<span id="total">0</span> 元
</div>

<button id="submitBtn" class="submit-btn" onclick="sendOrder()">
送出訂單
</button>

</div>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbyurfBQWR1p6_Fb9apnbHIXT07__h41afzFI0g_1AwtDulDnhwYBsqCLpAg2LcXFopShA/exec";

const data=[
["cat1","肉燥乾麵(小)",55],["cat1","肉燥乾麵(大)",65],
["cat1","肉燥米粉(小)",55],["cat1","肉燥米粉(大)",65],
["cat1","湯麵(小)",55],["cat1","湯麵(大)",65],
["cat1","麻醬麵(小)",60],["cat1","麻醬麵(大)",70],
["cat1","鮮蝦餛飩麵(小)",70],["cat1","鮮蝦餛飩麵(大)",80],
["cat2","黑輪",10],["cat2","米血",10],["cat2","魚板",10],["cat2","蛋丸",10],
["cat2","菜頭",15],["cat2","竹輪",15],["cat2","貢丸",20],["cat2","福州丸",20],
["cat2","黃金魚板",20],["cat2","高麗菜捲",20],["cat2","苦瓜封",40],
["cat3","麵輪",10],["cat3","滷蛋",15],["cat3","荷包蛋",15],["cat3","蔥蛋",40],["cat3","香腸",25],["cat3","手工大腸",75],
["cat4","菜頭湯",35],["cat4","魚丸湯",35],["cat4","貢丸湯",40],["cat4","鮮蝦餛飩湯",45],
["cat5","肉燥飯",35],["cat5","白飯",15],["cat5","燙青菜",40],["cat5","水餃",50]
];

// 建立菜單
data.forEach((m,i)=>{
document.getElementById(m[0]).insertAdjacentHTML('beforeend',`
<div class="item">
  <span>${m[1]} $${m[2]}</span>
  <div class="qty">
    <button onclick="minus(${i})">-</button>
    <span id="qty${i}">0</span>
    <button onclick="plus(${i})">+</button>
    <input type="hidden" id="i${i}" value="0">
  </div>
</div>
`);
});

function plus(i){
let el=document.getElementById('i'+i);
el.value=+el.value+1;
document.getElementById('qty'+i).innerText=el.value;
calc();
}

function minus(i){
let el=document.getElementById('i'+i);
if(el.value>0) el.value--;
document.getElementById('qty'+i).innerText=el.value;
calc();
}

function calc(){
let t=0;
data.forEach((m,i)=>{
let q=+document.getElementById('i'+i).value||0;
t+=q*m[2];
});
document.getElementById('total').innerText=t;
}

// 🔥 商用重點：防重送 + 狀態控制
let sending = false;

async function sendOrder(){

if(sending) return;

const btn=document.getElementById("submitBtn");
sending = true;
btn.disabled = true;
btn.innerText = "送出中...";

const name=document.getElementById('name').value.trim();
const phone=document.getElementById('phone').value.trim();

if(!name){
alert("請輸入姓名");
resetBtn(); return;
}

if(!/^09\d{8}$/.test(phone)){
alert("電話格式錯誤");
resetBtn(); return;
}

let items=[];
let total=0;

data.forEach((m,i)=>{
let q=+document.getElementById('i'+i).value||0;
if(q>0){
items.push(`${m[1]} x ${q}`);
total+=q*m[2];
}
});

if(items.length===0){
alert("請選餐");
resetBtn(); return;
}

const orderData = {
name: name,
phone: phone,
time: document.getElementById('time').value.trim(),
note: document.getElementById('note').value,
items: items.join('\n'),
total: total
};

try{

await fetch("https://script.google.com/macros/s/AKfycbyurfBQWR1p6_Fb9apnbHIXT07__h41afzFI0g_1AwtDulDnhwYBsqCLpAg2LcXFopShA/exec",{
method:"POST",
body:JSON.stringify(orderData)
});

document.body.innerHTML=`
<div style="text-align:center;padding:40px;">
<h1 style="color:#06C755;">
✅ 訂單送出成功
</h1>

<h2>
感謝您的訂購
</h2>

<p>
姓名：${orderData.name}
</p>

<p>
取餐時間：
${orderData.time ? orderData.time : '立即取餐'}
</p>

<p>
總金額：${total} 元
</p>

<p>
初萊食麵已收到您的訂單 🍜
</p>

<button onclick="location.reload()">再訂一筆</button>
</div>`;

}catch(e){
alert("送出失敗，請重試");
resetBtn();
}

}

function resetBtn(){
sending=false;
const btn=document.getElementById("submitBtn");
btn.disabled=false;
btn.innerText="送出訂單";
}
async function loadSetting(){

try{

const res = await fetch(SCRIPT_URL);

const text = await res.text();   // 🔥 先用 text

let data = {};

try {
  data = JSON.parse(text);       // 🔥 再手動轉 JSON
} catch(e) {
  console.log("不是 JSON 回傳：", text);
  return;
}

document.getElementById('notice').innerText =
data.notice || '';

if(data.status === '暫停'){
document.querySelector('.submit-btn').disabled = true;
document.querySelector('.submit-btn').innerText = '🚫 目前暫停接單';
}

}catch(err){
console.log(err);

}

}

loadSetting();

</script>

</body>
</html>
