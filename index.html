<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>初萊食麵  營業版</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0}
header{background:#c65d1e;color:#fff;text-align:center;padding:20px}
.wrap{
max-width:1000px;
margin:auto;
padding:15px;
padding-bottom:140px;
}
.card{background:#fff;border-radius:12px;padding:15px;margin:15px 0}
h2{margin-top:0}
.item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eee}
input[type=number]{width:70px}
input,textarea{width:100%;padding:10px;margin:6px 0;box-sizing:border-box}
button{background:#06C755;color:#fff;border:0;padding:14px;width:100%;border-radius:10px;font-size:18px}
.notice{background:#fff3cd;padding:10px;border-radius:8px}
.tel{display:inline-block;padding:10px 15px;background:#333;color:#fff;text-decoration:none;border-radius:8px}
.qty{
display:flex;
align-items:center;
gap:10px;
}

.qty button{
width:28px;
height:28px;
border:none;
border-radius:50%;
background:#c65d1e;
color:#fff;
font-size:18px;
padding:0;
}

.qty span{
display:inline-block;
width:30px;
text-align:center;
font-size:22px;
font-weight:bold;
}
.order-bar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#fff;
padding:15px;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
z-index:999;
}

.order-total{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}
</style>
</head>
<body>
<header>
<h1>初萊食麵</h1>
<p>高雄市三民區遼寧二街168號</p>
<p>週一~週五 11:30-20:30｜週六~週日 11:30-18:30</p>
<a class="tel" href="tel:0903392687">📞 0903-392687</a>
</header>

<div class="wrap">
<div class="card">
<h2>公告</h2>
<div class="notice" id="notice">
歡迎使用線上點餐，如有售完品項請依現場為準。
</div>
</div>

<div class="card"><h2>麵類</h2><div id="cat1"></div></div>
<div class="card"><h2>關東煮</h2><div id="cat2"></div></div>
<div class="card"><h2>小菜</h2><div id="cat3"></div></div>
<div class="card"><h2>湯類</h2><div id="cat4"></div></div>
<div class="card"><h2>其他</h2><div id="cat5"></div></div>

<div class="card">
<h2>訂購資訊</h2>
<input id="name" placeholder="姓名(必填)">
<input id="phone" placeholder="電話(必填)">
<textarea id="note" placeholder="備註：例如不加蔥、加辣"></textarea>
<input id="time" placeholder="預定取餐時間(即時取餐無需選擇)"{color:#fff}
type="time"
min="11:30"
max="20:30">
<div class="order-bar">

<div class="order-total">
總金額：<span id="total">0</span> 元
</div>

<button class="submit-btn" onclick="sendOrder()">
送出訂單
</button>

</div>
</div>
</div>

<script>
const data=[
["cat1","肉燥乾麵(小)",55],["cat1","肉燥乾麵(大)",65],
["cat1","肉燥米粉(小)",55],["cat1","肉燥米粉(大)",65],
["cat1","湯麵(小)",55],["cat1","湯麵(大)",65],
["cat1","麻醬麵(小)",60],["cat1","麻醬麵(大)",70],
["cat1","鮮蝦餛飩麵(小)",70],["cat1","鮮蝦餛飩麵(大)",80],
["cat2","黑輪",10],["cat2","米血",10],["cat2","魚板",10],["cat2","蛋丸",10],
["cat2","菜頭",15],["cat2","竹輪",15],["cat2","貢丸",20],["cat2","福州丸",20],
["cat2","黃金魚板",20],["cat2","高麗菜捲",20],["cat2","苦瓜封",40],
["cat3","麵輪",10],["cat3","滷蛋",15],["cat3","荷包蛋",15],["cat3","蔥蛋",40],["cat3","香腸",25],["cat3","手工大腸",75],
["cat4","菜頭湯",35],["cat4","魚丸湯",35],["cat4","貢丸湯",40],["cat4","鮮蝦餛飩湯",45],
["cat5","肉燥飯",35],["cat5","白飯",15],["cat5","燙青菜",40],["cat5","水餃",50]
];

data.forEach((m,i)=>{
document.getElementById(m[0]).insertAdjacentHTML(
'beforeend',
`
<div class="item">
  <span>${m[1]} $${m[2]}</span>

  <div class="qty">
    <button type="button" onclick="minus(${i})">-</button>
    <span id="qty${i}">0</span>
    <button type="button" onclick="plus(${i})">+</button>
    <input type="hidden" id="i${i}" value="0">
  </div>
</div>
`
);
});

function plus(i){
  let el = document.getElementById('i'+i);
  el.value = parseInt(el.value || 0) + 1;
  document.getElementById('qty'+i).innerText = el.value;
  calc();
}

function minus(i){
  let el = document.getElementById('i'+i);

  if(parseInt(el.value) > 0){
    el.value = parseInt(el.value) - 1;
  }

  document.getElementById('qty'+i).innerText = el.value;
  calc();
}

function calc(){
  let t = 0;

  data.forEach((m,i)=>{
    let q = parseInt(document.getElementById('i'+i).value) || 0;
    t += q * m[2];
  });

  document.getElementById('total').innerText = t;
}

async function sendOrder(){

const name = document.getElementById('name').value.trim();
const phone = document.getElementById('phone').value.trim();

if(name === ''){
  alert('請輸入姓名');
  return;
}

if(phone === ''){
  alert('請輸入電話');
  return;
}

if(!/^09\d{8}$/.test(phone)){
  alert('請輸入正確手機號碼');
  return;
}

let total = 0;
let items = [];

data.forEach((m,i)=>{

let q = parseInt(
document.getElementById('i'+i).value
) || 0;

if(q > 0){
items.push(`${m[1]} x ${q}`);
total += q * m[2];
}

});

if(items.length === 0){
alert('請先選擇餐點');
return;
}

const orderData = {
name: name,
phone: phone,
time: document.getElementById('time').value.trim(),
note: document.getElementById('note').value,
items: items.join('\n'),
total: total
};

try{

await fetch(
'https://script.google.com/macros/s/AKfycbyurfBQWR1p6_Fb9apnbHIXT07__h41afzFI0g_1AwtDulDnhwYBsqCLpAg2LcXFopShA/exec',
{
method:'POST',
mode:'no-cors',
headers:{
'Content-Type':'text/plain'
},
body:JSON.stringify(orderData)
}
);

document.body.innerHTML = `
<div style="
max-width:500px;
margin:50px auto;
padding:30px;
text-align:center;
font-family:Arial;
">

<h1 style="color:#06C755;">
✅ 訂單送出成功
</h1>

<h2>
感謝您的訂購
</h2>

<p>
姓名：${orderData.name}
</p>

<p>
取餐時間：
${orderData.time || '立即取餐'}
</p>

<p>
總金額：${total} 元
</p>

<p>
初萊食麵已收到您的訂單 🍜
</p>

<button
onclick="location.reload()"
style="
background:#06C755;
color:white;
border:none;
padding:12px 25px;
border-radius:10px;
font-size:18px;
">
再訂一筆
</button>

</div>
`;

}catch(err){

alert(err);

}

}
async function loadSetting(){

try{

const res = await fetch(
'https://script.google.com/macros/s/AKfycbyurfBQWR1p6_Fb9apnbHIXT07__h41afzFI0g_1AwtDulDnhwYBsqCLpAg2LcXFopShA/exec'
);

const data = await res.json();

document.getElementById('notice').innerText =
data.notice || '';

if(data.status === '暫停'){

document.querySelector('.submit-btn').disabled = true;

document.querySelector('.submit-btn').innerText =
'🚫 目前暫停接單';

document.querySelector('.submit-btn').style.background =
'#999';

}

}catch(err){

console.log(err);

}

}

loadSetting();

</script>
</body>
</html>
