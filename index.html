<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>初萊食麵</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#ededed;
  margin:0;
  color:#333;
}
.hero{
  text-align:center;
  padding:25px 15px;
  background:linear-gradient(135deg,#2f2f2f,#1c1c1c);
  color:#d4af37;
  border-bottom:3px solid #d4af37;
}

.hero h2{
  font-size:28px;
  margin:0;
}

.hero p{
  font-size:14px;
  color:#f1d98a;
  margin-top:8px;
}

.status{
  margin-top:10px;
  display:inline-block;
  padding:6px 12px;
  border-radius:20px;
  background:#28a745;
  color:#fff;
  font-size:13px;
}
/* ===== Header 品牌化 ===== */
header{
  background:linear-gradient(135deg,#2f2f2f,#4a4a4a);
  color:#d4af37;
  text-align:center;
  padding:22px 10px;
  border-bottom:3px solid #d4af37;
}

header h1{
  font-size:30px;
  letter-spacing:3px;
  margin:6px 0;
  color:#d4af37;
  font-weight:bold;
}

header p, header a{
  color:#f1d98a;
  font-size:13px;
}

<div class="hero">
  <h2>🍜 初萊食麵</h2>
  <p>肉燥乾麵｜關東煮｜水餃｜在地小吃</p>

  <div class="status" id="status">🟢 正常營業中</div>
</div>

/* ===== 容器 ===== */
.wrap{
  max-width:900px;
  margin:auto;
  padding:12px;
  padding-bottom:120px;
}

/* ===== 卡片 ===== */
.card{
  background:#fff;
  border-radius:12px;
  margin-bottom:12px;
  padding:15px;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
}

.card h2{
  color:#b8912e;
  border-left:6px solid #d4af37;
  padding-left:10px;
  font-size:17px;
  margin-bottom:10px;
}

/* ===== 商品列 ===== */
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #eee;
  background:#fff;
  border-radius:8px;
  margin:6px 0;
}

.item span{
  font-size:15px;
}

/* ===== 加減 ===== */
.qty{
  display:flex;
  align-items:center;
  gap:6px;
}

.qty button{
  width:32px;
  height:32px;
  border-radius:6px;
  border:1px solid #d4af37;
  background:#2f2f2f;
  color:#d4af37;
  font-size:18px;
}

.qty button:active{
  transform:scale(0.92);
}

.qty span{
  min-width:22px;
  text-align:center;
  font-weight:bold;
}

/* ===== 輸入 ===== */
input, textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

/* ===== 圖片 ===== */
img{
  width:100%;
  border-radius:12px;
}

/* ===== 底部結帳列 ===== */
.checkout-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#2f2f2f;
  color:#d4af37;
  padding:12px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-top:2px solid #d4af37;
  z-index:999;
}

.checkout-bar .total{
  font-size:18px;
  font-weight:bold;
}

.checkout-bar button{
  background:#d4af37;
  color:#2f2f2f;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  font-weight:bold;
}

.checkout-bar button:active{
  transform:scale(0.95);
}

/* ===== 總金額 ===== */
#total{
  font-size:28px;
  color:#d4af37;
  font-weight:bold;
}
.bigbtn{
  display:block;
  text-decoration:none;
  padding:16px;
  margin:12px 0;
  border-radius:12px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
  color:#fff;
  transition:0.25s;
}

.bigbtn:active{
  transform:scale(0.97);
}

.self{
  background:#28a745;
}

.uber{
  background:#000000;
}

.panda{
  background:#ff2b85;
}

.phone{
  background:#0d6efd;
}

.map{
  background:#f39c12;
}
.popular{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.food{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 12px rgba(0,0,0,.12);
    transition:.3s;
}

.food:hover{
    transform:translateY(-5px);
}

.food img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.food h3{
    text-align:center;
    margin:12px 0 6px;
    color:#b8912e;
}

.food p{
    text-align:center;
    color:#777;
    margin-bottom:15px;
}
</style>
</head>

<body>

<header>
<h1>初萊食麵</h1>
<p>高雄市三民區遼寧二街168號</p>
<p>週一~週五 11:30-20:30｜週六~週日 11:30-18:30</p>
<a href="tel:0903392687">📞 0903-392687</a>
</header>

<div class="wrap">

<div class="card">
<img src="https://res.cloudinary.com/dh1yjrfyr/image/upload/q_auto,f_auto/IMG_3424_ob2qm4.jpg">
</div>

<div class="card">
<h2>公告</h2>
<div id="notice">歡迎使用線上點餐</div>
</div>

<div class="card">
<h2>🚀 線上點餐入口</h2>

<a class="bigbtn self" href="#cat1">
🍜 店內點餐（最優惠 / 免平台抽成）
</a>

<a class="bigbtn uber"
href="https://www.ubereats.com/tw/store/初萊食麵|大腸香腸、關東煮/9-pIirZHWkWxCprbnjgzBQ?diningMode=PICKUP&ps=1&sc=SEARCH_SUGGESTION"
target="_blank">
🛵 Uber Eats
</a>

<a class="bigbtn panda"
href="https://foodpanda.com.tw/restaurant/o32y/chu-lai-shi-mian"
target="_blank">
🐼 foodpanda
</a>

<a class="bigbtn phone" href="tel:0903392687">
📞 電話訂餐
</a>

<a class="bigbtn map"
href="https://maps.app.goo.gl/HKeMyZ1iDuBQ5QWQ9?g_st=ic"
target="_blank">
📍 Google 地圖
</a>

</div>
<div class="card">
<h2>🔥 人氣推薦</h2>

<div class="popular">

<div class="food">
<img src="IMG_3516.jpeg" alt="肉燥乾麵">
<h3>🍜 肉燥乾麵</h3>
<p>招牌必點</p>
</div>

<div class="food">
<img src="IMG_3515.jpeg" alt="水餃">
<h3>🥟 水餃</h3>
<p>每日現煮</p>
</div>

<div class="food">
<img src="IMG_3517.jpeg" alt="黑輪">
<h3>🍢 關東煮</h3>
<p>人氣推薦</p>
</div>

</div>

</div>
<div class="card"><h2>🍜 麵類</h2><div id="cat1"></div></div>
<div class="card"><h2>🍢 關東煮</h2><div id="cat2"></div></div>
<div class="card"><h2>🥚 小菜</h2><div id="cat3"></div></div>
<div class="card"><h2>🍲 湯類</h2><div id="cat4"></div></div>
<div class="card"><h2>🍚 其他</h2><div id="cat5"></div></div>

<div class="card">
<h2>訂購資訊</h2>
<input id="name" placeholder="姓名(必填)">
<input id="phone" placeholder="電話(必填)">
<textarea id="note" placeholder="備註"></textarea>
<input id="time" type="time">
</div>

</div>

<!-- 底部結帳列 -->
<div class="checkout-bar">
  <div>總金額：<span id="total">0</span> 元</div>
  <button id="submitBtn" onclick="sendOrder()">送出訂單</button>
</div>
<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYMTH533Tn9GlVNgPn7m8fZqTGDA6_Nu9nJyLMdwgml8bM4R_jh6BgbyuAT5OJzBHTHw/exec";

const data = [
["cat1","肉燥乾麵(小)",55],["cat1","肉燥乾麵(大)",65],
["cat1","肉燥米粉(小)",55],["cat1","肉燥米粉(大)",65],
["cat1","湯麵(小)",55],["cat1","湯麵(大)",65],
["cat1","麻醬麵(小)",60],["cat1","麻醬麵(大)",70],
["cat1","鮮蝦餛飩乾麵(小)",70],["cat1","鮮蝦餛飩乾麵(大)",80],["cat1","鮮蝦餛飩湯麵(小)",70],["cat1","鮮蝦餛飩湯麵(大)",80],
["cat2","黑輪",10],["cat2","米血",10],["cat2","魚板",10],["cat2","蛋丸",10],
["cat2","菜頭",15],["cat2","竹輪",15],["cat2","貢丸",20],["cat2","福州丸",20],
["cat2","黃金魚板",20],["cat2","高麗菜捲",20],["cat2","苦瓜封",40],
["cat3","麵輪",10],["cat3","滷蛋",15],["cat3","荷包蛋",15],["cat3","蔥蛋",40],["cat3","香腸",25],["cat3","手工大腸",75],
["cat4","菜頭湯",35],["cat4","魚丸湯",35],["cat4","貢丸湯",40],["cat4","鮮蝦餛飩湯",45],
["cat5","肉燥飯",35],["cat5","白飯",15],["cat5","燙青菜",40],["cat5","水餃",50]
];

// 畫商品
data.forEach((m,i)=>{
  const el=document.getElementById(m[0]);
  if(!el) return;

  el.insertAdjacentHTML('beforeend',`
  <div class="item">
    <span>${m[1]} $${m[2]}</span>
    <div class="qty">
      <button onclick="minus(${i})">-</button>
      <span id="qty${i}">0</span>
      <button onclick="plus(${i})">+</button>
      <input type="hidden" id="i${i}" value="0">
    </div>
  </div>`);
});

function plus(i){
  let el=document.getElementById('i'+i);
  el.value=+el.value+1;
  document.getElementById('qty'+i).innerText=el.value;
  calc();
}

function minus(i){
  let el=document.getElementById('i'+i);
  if(el.value>0) el.value--;
  document.getElementById('qty'+i).innerText=el.value;
  calc();
}

function calc(){
  let t=0;
  data.forEach((m,i)=>{
    let q=+document.getElementById('i'+i).value||0;
    t+=q*m[2];
  });
  document.getElementById('total').innerText=t;
}

async function loadSetting(){
  try{
    const res = await fetch(SCRIPT_URL);
    const setting = await res.json();

    document.getElementById("notice").innerText = setting.notice || "";

    if(setting.status === "暫停"){
      const btn = document.querySelector(".checkout-bar button");
      btn.disabled = true;
      btn.innerText = "🚫 暫停接單";
    }

  }catch(err){
    console.log("loadSetting error", err);
  }
}

loadSetting();

async function sendOrder(){

  const name=document.getElementById('name').value.trim();
  const phone=document.getElementById('phone').value.trim();

  if(!name) return alert('請輸入姓名');
  if(!/^09\d{8}$/.test(phone)) return alert('電話錯誤');

  let items=[];
  let total=0;

  data.forEach((m,i)=>{
    let q=+document.getElementById('i'+i).value||0;
    if(q>0){
      items.push(`${m[1]} x ${q}`);
      total+=q*m[2];
    }
  });

  if(items.length===0) return alert('請選餐');

const btn = document.getElementById("submitBtn");

// 防止重複送單
btn.disabled = true;
btn.innerHTML = "📤 訂單送出中...";

  try{

    const res = await fetch(SCRIPT_URL,{
  method:'POST',
  body: JSON.stringify({
    name,
    phone,
    time: document.getElementById('time').value,
    note: document.getElementById('note').value,
    items: items.join('\n'),
    total
  })
});

    console.log(await res.text());

    const orderSummary = `
🎉 訂單已送出！

━━━━━━━━━━━━

${items.join('\n')}

━━━━━━━━━━━━

💰 合計：${total} 元

📍 取餐方式：${document.getElementById('time').value}

📝 備註：
${document.getElementById('note').value || '無'}

❤️ 感謝您支持初萊食麵！
`;

btn.innerHTML = "✅ 已送出";

alert(orderSummary);

location.reload();

  }catch(err){
    console.log("送單錯誤", err);
btn.disabled = false;
btn.innerHTML = "送出訂單";

alert("送單失敗，請再試一次！");
  }
}

</script>

</body>
