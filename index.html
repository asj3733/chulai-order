<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>初萊食麵 營業版</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  margin:0;
}

header{
  background:#c65d1e;
  color:#fff;
  text-align:center;
  padding:20px;
}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:15px;
  padding-bottom:140px;
}

.card{
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #eee;
}

.qty button{
  width:30px;
  height:30px;
}
</style>
</head>

<body>

<header>
<h1>初萊食麵</h1>
<p>高雄市三民區遼寧二街168號</p>
<p>週一~週五 11:30-20:30｜週六~週日 11:30-18:30</p>
<a href="tel:0903392687" style="color:#fff;">📞 0903-392687</a>
</header>

<div class="wrap">

<!-- 圖片（已修Cloudinary穩定版） -->
<div class="card">
<img 
  src="https://res.cloudinary.com/dh1yjrfyr/image/upload/q_auto,f_auto/IMG_3424_ob2qm4.jpg"
  style="width:100%;max-height:260px;object-fit:cover;border-radius:12px;"
>
</div>

<!-- 公告 -->
<div class="card">
<h2>公告</h2>
<div id="notice">歡迎使用線上點餐，如有售完品項請依現場為準。</div>
</div>

<!-- 菜單 -->
<div class="card"><h2>🍜 麵類</h2><div id="cat1"></div></div>
<div class="card"><h2>🍢 關東煮</h2><div id="cat2"></div></div>
<div class="card"><h2>🥚 小菜</h2><div id="cat3"></div></div>
<div class="card"><h2>🍲 湯類</h2><div id="cat4"></div></div>
<div class="card"><h2>🍚 其他</h2><div id="cat5"></div></div>

<!-- 訂購 -->
<div class="card">
<h2>訂購資訊</h2>

<input id="name" placeholder="姓名(必填)">
<input id="phone" placeholder="電話(必填)">
<textarea id="note" placeholder="備註"></textarea>

<input id="time" type="time" min="11:30" max="20:30">

<div style="font-weight:bold;margin:10px 0;">
總金額：<span id="total">0</span> 元
</div>

<button class="submit-btn" onclick="sendOrder()">
送出訂單
</button>

</div>

</div>

<script>

// 菜單資料
const data=[
["cat1","肉燥乾麵(小)",55],["cat1","肉燥乾麵(大)",65],
["cat1","肉燥米粉(小)",55],["cat1","肉燥米粉(大)",65],
["cat1","湯麵(小)",55],["cat1","湯麵(大)",65],
["cat2","黑輪",10],["cat2","米血",10],
["cat3","滷蛋",15],["cat3","荷包蛋",15],
["cat4","貢丸湯",40],
["cat5","肉燥飯",35]
];

// 建立菜單
data.forEach((m,i)=>{
document.getElementById(m[0]).insertAdjacentHTML('beforeend',`
<div class="item">
  <span>${m[1]} $${m[2]}</span>
  <div class="qty">
    <button onclick="minus(${i})">-</button>
    <span id="qty${i}">0</span>
    <button onclick="plus(${i})">+</button>
    <input type="hidden" id="i${i}" value="0">
  </div>
</div>
`);
});

function plus(i){
let el=document.getElementById('i'+i);
el.value=+el.value+1;
document.getElementById('qty'+i).innerText=el.value;
calc();
}

function minus(i){
let el=document.getElementById('i'+i);
if(el.value>0) el.value--;
document.getElementById('qty'+i).innerText=el.value;
calc();
}

function calc(){
let t=0;
data.forEach((m,i)=>{
let q=+document.getElementById('i'+i).value||0;
t+=q*m[2];
});
document.getElementById('total').innerText=t;
}

// 送出訂單
async function sendOrder(){

const name=document.getElementById('name').value.trim();
const phone=document.getElementById('phone').value.trim();

if(!name) return alert('請輸入姓名');
if(!/^09\d{8}$/.test(phone)) return alert('電話格式錯誤');

let items=[];
let total=0;

data.forEach((m,i)=>{
let q=+document.getElementById('i'+i).value||0;
if(q>0){
items.push(`${m[1]} x ${q}`);
total+=q*m[2];
}
});

if(items.length===0) return alert('請選餐');

const orderData={
name,
phone,
time:document.getElementById('time').value,
note:document.getElementById('note').value,
items:items.join('\n'),
total
};

await fetch("你的Google Script網址",{
method:'POST',
mode:'no-cors',
body:JSON.stringify(orderData)
});

document.body.innerHTML=`
<div style="text-align:center;padding:40px;">
<h1>✅ 訂單成功</h1>
<p>總金額：${total}</p>
<button onclick="location.reload()">再訂一筆</button>
</div>`;
}

</script>
</body>
</html>
